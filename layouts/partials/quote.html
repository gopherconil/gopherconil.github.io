{{ with .quote }}
<aside class="quote-band reveal">
  <figure class="quote-card">
    <span class="quote-mark" aria-hidden="true">&ldquo;</span>
    <blockquote class="quote-text">{{ .text }}</blockquote>
    <figcaption class="quote-by">
      <a href="{{ .url }}" target="_blank" rel="noopener" class="quote-author">
        <span class="quote-x" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25h6.83l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </span>
        <span class="quote-meta">
          <span class="quote-name">{{ .author }}</span>
          <span class="quote-handle">{{ .handle }}</span>
        </span>
      </a>
    </figcaption>
  </figure>
</aside>
{{ end }}
